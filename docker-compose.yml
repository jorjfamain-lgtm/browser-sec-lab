services:
  # ----------------------------------------
  # NGINX (Web Server)
  # ----------------------------------------
  nginx:
    image: nginx:stable-alpine
    container_name: sec_lab_nginx
    ports:
      - "58690:80"  # روی سرور پورت 80 باز باشد
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_started
    networks:
      - lab_net
    restart: always

  # ----------------------------------------
  # PHP-FPM (Vulnerable Laravel Core)
  # ----------------------------------------
  php:
    container_name: sec_lab_php
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      args:
        # اینجا می‌توانید آدرس Nexus داخلی سرور خود را بدهید
        - COMPOSER_REGISTRY=http://192.168.1.201:8081/
        - LINUX_REGISTRY=http://192.168.1.201:8081/
        - SECURITY_REGISTRY=http://192.168.1.201:8081/
    volumes:
      - ./:/var/www/html:rw
    networks:
      - lab_net
    restart: always

networks:
  lab_net:
    driver: bridge