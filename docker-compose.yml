services:
  # ----------------------------------------
  # NGINX (Web Server)
  # ----------------------------------------
  nginx:
    image: nginx:stable-alpine
    container_name: sec_lab_nginx
    ports:
      - "58690:80"  # روی سرور پورت 80 باز باشد
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_started
    networks:
      - lab_net
    restart: always

  # ----------------------------------------
  # PHP-FPM (Vulnerable Laravel Core)
  # ----------------------------------------
  php:
    container_name: sec_lab_php
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      args:
        # اینجا می‌توانید آدرس Nexus داخلی سرور خود را بدهید
        - COMPOSER_REGISTRY=http://192.168.1.201:8081/repository/composer-runflare/
        - LINUX_REGISTRY=http://192.168.1.201:8081/repository/debian-arvan
        - SECURITY_REGISTRY=http://192.168.1.201:8081/repository/debian-arvan-security
        - NPM_REGISTRY=http://192.168.1.201:8081/repository/npm-group/
        - NODE_REGISTRY=http://192.168.1.201:8081/repository/node-dist
    volumes:
      - ./:/var/www/html:rw
    networks:
      - lab_net
    restart: always

# اپلیکیشن دوم: سرور هکر (یک سرور بسیار سبک برای میزبانی پی‌لودها)
  hacker-app:
    image: nginx:alpine
    container_name: sec_lab_hacker
    volumes:
      - ./hacker_files:/usr/share/nginx/html:ro
    networks:
      - lab_net
    restart: always

networks:
  lab_net:
    driver: bridge